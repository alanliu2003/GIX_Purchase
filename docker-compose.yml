# GIX purchases — web UI + Streamlit + MySQL
#
# 1. Copy .env.example to .env and set MYSQL_ROOT_PASSWORD (required).
# 2. docker compose up --build -d
# 3. Open http://YOUR_SERVER_IP:8000 (JavaScript UI) and/or :8501 (Streamlit)
#
# For HTTPS on a real domain, put Caddy or nginx in front (see DOCKER.md).

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: gix_purchases
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 25s

  web:
    build: .
    image: gix-purchases-app:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: gix_purchases
    depends_on:
      mysql:
        condition: service_healthy

  # Same image as `web`; `web` must build first (`docker compose up --build`).
  streamlit:
    image: gix-purchases-app:latest
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: gix_purchases
    command:
      [
        "streamlit",
        "run",
        "streamlit_app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
        "--server.headless=true",
      ]
    depends_on:
      mysql:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  mysql_data:
